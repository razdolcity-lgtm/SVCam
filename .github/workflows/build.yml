name: Build VCamSX Standard Module

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 强制使用 Gradle 8.5 构建 APK（兼容项目配置）
      - name: Build APK with Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - run: ./gradlew assembleRelease || true # 即使APK构建失败，也继续打包模块

      # 构建标准 KernelSU 模块（核心修复：添加必需的更新脚本）
      - name: Build Standard KernelSU Module
        run: |
          # 创建完整模块目录
          mkdir -p VCamSX-Module/{META-INF/com/google/android,system/vendor/etc/permissions}
          
          # 1. 写入核心更新脚本（KernelSU 必需）
          cat > VCamSX-Module/META-INF/com/google/android/update-binary << 'EOF'
          #!/system/bin/sh
          MODDIR=${0%/*}
          unzip -o "$ZIPFILE" -d "$MODDIR" >&2
          mkdir -p /data/adb/modules/VCamSX
          cp -r "$MODDIR"/* /data/adb/modules/VCamSX/
          chmod 755 /data/adb/modules/VCamSX/service.sh
          touch /data/adb/modules/VCamSX/update
          EOF
          chmod 755 VCamSX-Module/META-INF/com/google/android/update-binary

          # 2. 写入模块配置
          cat > VCamSX-Module/module.prop << EOF
          id=VCamSX
          name=VCamSX Virtual Camera
          version=1.0
          versionCode=1
          author=Your Name
          description=Virtual Camera Module for LSPosed/KernelSU
          minApi=26
          ksuMinVersion=10670
          EOF

          # 3. 写入启动脚本
          cat > VCamSX-Module/service.sh << EOF
          #!/system/bin/sh
          MODDIR=\${0%/*}
          # 等待系统加载完成
          until [ -d /sys/class/power_supply ]; do sleep 1; done
          # 模块核心逻辑（纯 LSPosed 模块无需额外命令）
          EOF
          chmod 755 VCamSX-Module/service.sh

          # 4. 打包为标准 zip
          cd VCamSX-Module
          zip -r9 ../VCamSX-KernelSU-Module.zip ./*
          cd ..

      # 上传产物
      - name: Upload Module
        uses: actions/upload-artifact@v4
        with:
          name: VCamSX-KernelSU-Module
          path: VCamSX-KernelSU-Module.zip
